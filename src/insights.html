<!DOCTYPE html>
<html>
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{
    width:100%;height:100%;overflow-y:auto;overflow-x:hidden;
    background:#0c0a10;
    font-family:'DM Sans',-apple-system,sans-serif;color:#fff;
    -webkit-font-smoothing:antialiased;
  }
  body{padding:32px 28px 40px}

  /* ── Title bar drag region ── */
  .titlebar{-webkit-app-region:drag;height:28px;position:fixed;top:0;left:0;right:0;z-index:100}

  /* ── Header ── */
  .header{display:flex;align-items:center;gap:14px;margin-bottom:28px;margin-top:8px}
  .header-emoji{font-size:32px;filter:drop-shadow(0 0 20px rgba(255,120,30,.4))}
  .header h1{font-size:22px;font-weight:700;letter-spacing:-.02em;color:rgba(255,248,240,.9)}
  .header .rank{font-size:12px;font-weight:500;color:rgba(255,200,150,.5);margin-top:2px}

  /* ── Persona card ── */
  .persona{
    background:linear-gradient(135deg,rgba(255,120,30,.08),rgba(255,60,90,.04));
    border-radius:16px;padding:24px;margin-bottom:24px;
    text-align:center;position:relative;overflow:hidden;
  }
  .persona::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse at 50% 100%,rgba(255,120,30,.1),transparent 70%);
  }
  .persona-emoji{font-size:48px;display:block;margin-bottom:10px;position:relative;
    filter:drop-shadow(0 0 30px rgba(255,120,30,.4))}
  .persona-name{font-size:20px;font-weight:700;color:rgba(255,240,220,.9);position:relative;margin-bottom:4px}
  .persona-desc{font-size:13px;color:rgba(255,200,150,.4);position:relative}

  /* ── Stats grid ── */
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
  .stat{
    background:rgba(255,255,255,.03);border-radius:14px;padding:20px 16px;
    text-align:center;
  }
  .stat-value{font-size:28px;font-weight:700;color:rgba(255,240,220,.9);
    text-shadow:0 0 20px rgba(255,120,30,.15)}
  .stat-label{font-size:11px;font-weight:500;color:rgba(255,200,150,.35);
    text-transform:uppercase;letter-spacing:.06em;margin-top:4px}

  /* ── Breakdown ── */
  .section-title{font-size:13px;font-weight:600;color:rgba(255,200,150,.4);
    text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
  .breakdown{margin-bottom:24px}
  .bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .bar-icon{width:20px;text-align:center;flex-shrink:0}
  .bar-label{font-size:13px;color:rgba(255,220,180,.6);width:80px;flex-shrink:0}
  .bar-track{flex:1;height:6px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden}
  .bar-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.16,1,.3,1)}
  .bar-count{font-size:12px;color:rgba(255,200,150,.35);width:36px;text-align:right;flex-shrink:0}

  /* ── Session info ── */
  .session{
    background:rgba(255,255,255,.02);border-radius:12px;padding:16px;
    font-size:12px;color:rgba(255,200,150,.25);
  }
  .session div{margin-bottom:4px}
  .session span{color:rgba(255,200,150,.45)}

  /* ── Loading ── */
  .loading{text-align:center;padding:60px 0;color:rgba(255,200,150,.3);font-size:14px}
  .loading .spinner{
    width:24px;height:24px;border:2px solid rgba(255,120,30,.15);
    border-top-color:rgba(255,120,30,.5);border-radius:50%;
    animation:spin .8s linear infinite;margin:0 auto 12px;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="titlebar"></div>
<div id="app"><div class="loading"><div class="spinner"></div>Loading insights...</div></div>

<script>
const SUPABASE_URL = 'https://azgmndwisctadoousbij.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6Z21uZHdpc2N0YWRvb3VzYmlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzNDY3NDEsImV4cCI6MjA4NjkyMjc0MX0.T0gs_PPHSBKyOYf3W7nfKGqJN86cvrXPmCPF4PxI9r0';

// Get device ID from main process
const deviceId = new URLSearchParams(window.location.search).get('device') || '';

async function fetchStats() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/whip_events?device_id=eq.${deviceId}&select=*&order=created_at.desc&limit=1000`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) throw new Error('fetch failed');
    return await res.json();
  } catch (_) {
    return null;
  }
}

// ── Persona system ──
const PERSONAS = [
  { min: 0,   emoji: '🥚', name: 'Fresh Egg', desc: 'Just getting started' },
  { min: 10,  emoji: '👋', name: 'Casual Slapper', desc: 'Testing the waters' },
  { min: 50,  emoji: '🍑', name: 'Cheeky One', desc: 'Getting into it' },
  { min: 100, emoji: '⚡', name: 'Speed Demon', desc: 'Can\'t stop won\'t stop' },
  { min: 250, emoji: '🔥', name: 'Clanker', desc: 'Enter key abuser' },
  { min: 500, emoji: '💀', name: 'Unhinged', desc: 'Seek help (but don\'t stop)' },
  { min: 1000,emoji: '👑', name: 'Whip Royalty', desc: 'Legendary status achieved' },
];

function getPersona(total) {
  let p = PERSONAS[0];
  for (const persona of PERSONAS) {
    if (total >= persona.min) p = persona;
  }
  return p;
}

// ── Trigger display config ──
const TRIGGERS = {
  enter:           { icon: '⌨️', label: 'Enter', color: 'rgba(255,180,80,.7)' },
  kiro_prompt:     { icon: '💬', label: 'Prompt', color: 'rgba(139,92,246,.7)' },
  kiro_tool:       { icon: '🔧', label: 'Tool', color: 'rgba(59,130,246,.7)' },
  kiro_task:       { icon: '✅', label: 'Task', color: 'rgba(34,197,94,.7)' },
  kiro_edit:       { icon: '✏️', label: 'Edit', color: 'rgba(236,72,153,.7)' },
  kiro_agent_stop: { icon: '🏁', label: 'Done', color: 'rgba(251,191,36,.7)' },
  kiro_hook:       { icon: '🔗', label: 'Hook', color: 'rgba(168,85,247,.7)' },
};

function render(events) {
  const app = document.getElementById('app');

  if (!events || events.length === 0) {
    app.innerHTML = `
      <div class="header">
        <span class="header-emoji">🍑</span>
        <div><h1>Whip Me Bad</h1><div class="rank">No whips yet</div></div>
      </div>
      <div style="text-align:center;padding:40px 0;color:rgba(255,200,150,.3)">
        <div style="font-size:48px;margin-bottom:12px">🥚</div>
        <div style="font-size:15px">Start whipping to see your stats</div>
      </div>`;
    return;
  }

  const total = events.length;
  const persona = getPersona(total);

  // Count by trigger type
  const counts = {};
  let hasKiro = false;
  for (const e of events) {
    counts[e.trigger_type] = (counts[e.trigger_type] || 0) + 1;
    if (e.trigger_type.startsWith('kiro_')) hasKiro = true;
  }

  // Sessions count
  const sessions = new Set(events.map(e => e.session_id)).size;

  // Today's count
  const today = new Date().toISOString().slice(0, 10);
  const todayCount = events.filter(e => e.created_at.slice(0, 10) === today).length;

  // Max in a single session
  const sessionCounts = {};
  for (const e of events) sessionCounts[e.session_id] = (sessionCounts[e.session_id] || 0) + 1;
  const maxSession = Math.max(...Object.values(sessionCounts));

  // Build breakdown bars
  const maxCount = Math.max(...Object.values(counts));
  let barsHTML = '';
  const sortedTriggers = Object.entries(counts).sort((a, b) => b[1] - a[1]);

  for (const [type, count] of sortedTriggers) {
    // Skip kiro triggers if user doesn't use kiro
    if (!hasKiro && type.startsWith('kiro_')) continue;
    const t = TRIGGERS[type] || { icon: '❓', label: type, color: 'rgba(255,200,150,.5)' };
    const pct = (count / maxCount * 100).toFixed(0);
    barsHTML += `
      <div class="bar-row">
        <div class="bar-icon">${t.icon}</div>
        <div class="bar-label">${t.label}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${t.color}"></div></div>
        <div class="bar-count">${count}</div>
      </div>`;
  }

  app.innerHTML = `
    <div class="header">
      <span class="header-emoji">🍑</span>
      <div><h1>Whip Me Bad</h1><div class="rank">Your whip insights</div></div>
    </div>

    <div class="persona">
      <span class="persona-emoji">${persona.emoji}</span>
      <div class="persona-name">${persona.name}</div>
      <div class="persona-desc">${persona.desc}</div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-value">${total}</div>
        <div class="stat-label">Total Whips</div>
      </div>
      <div class="stat">
        <div class="stat-value">${todayCount}</div>
        <div class="stat-label">Today</div>
      </div>
      <div class="stat">
        <div class="stat-value">${sessions}</div>
        <div class="stat-label">Sessions</div>
      </div>
      <div class="stat">
        <div class="stat-value">${maxSession}</div>
        <div class="stat-label">Best Session</div>
      </div>
    </div>

    <div class="breakdown">
      <div class="section-title">Breakdown</div>
      ${barsHTML}
    </div>

    <div class="session">
      <div>Device: <span>${deviceId.slice(0, 8)}...</span></div>
      <div>Sessions: <span>${sessions}</span></div>
      <div>Since: <span>${new Date(events[events.length - 1].created_at).toLocaleDateString()}</span></div>
    </div>`;

  // Animate bars in
  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(el => {
      el.style.width = el.style.width; // trigger reflow
    });
  }, 100);
}

// Load and render
fetchStats().then(render).catch(() => {
  document.getElementById('app').innerHTML = `
    <div style="text-align:center;padding:60px 0;color:rgba(255,200,150,.3)">
      <div style="font-size:14px">Couldn't load stats. Check your connection.</div>
    </div>`;
});
</script>
</body>
</html>
